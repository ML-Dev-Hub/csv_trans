name: Publish release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Validate tag matches package version
        shell: bash
        run: |
          version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version"

      - name: Install build frontend
        run: python -m pip install build==1.5.0

      - name: Run offline standard-library tests
        run: python -m unittest discover -s tests -v

      - name: Build wheel and source distribution
        run: python -m build

      - name: Install and inspect the release wheel
        run: >-
          python -c "import glob, subprocess, sys;
          wheels = glob.glob('dist/*.whl');
          assert len(wheels) == 1, wheels;
          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--no-deps', wheels[0]])"

      - name: Verify release metadata
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import importlib.metadata as m, os; expected = os.environ['GITHUB_REF_NAME'].removeprefix('v'); assert m.version('csv-trans') == expected; assert not (m.requires('csv-trans') or [])"
          python -c "from importlib.resources import files; assert files('csv_trans').joinpath('py.typed').is_file()"
          python -m pip check

      - name: Create an isolated source-distribution environment
        run: python -m venv "${RUNNER_TEMP}/csv-trans-sdist"

      - name: Install and inspect the release source distribution
        shell: bash
        run: |
          sdists=(dist/*.tar.gz)
          test "${#sdists[@]}" -eq 1
          test -f "${sdists[0]}"
          "${RUNNER_TEMP}/csv-trans-sdist/bin/python" -m pip install --no-deps "${sdists[0]}"
          cd "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/csv-trans-sdist/bin/python" -c "import importlib.metadata as m, os; expected = os.environ['GITHUB_REF_NAME'].removeprefix('v'); assert m.version('csv-trans') == expected; assert not (m.requires('csv-trans') or [])"
          "${RUNNER_TEMP}/csv-trans-sdist/bin/csv-trans" --help

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/csv-trans/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: dist/

      - name: Publish through PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
